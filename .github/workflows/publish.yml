name: Publish ICS Files
on:
    push:
       branches: [main]
    schedule:
        - cron: "0 0 * * *"


jobs:
  generate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: CPsched.Backend
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Generate ICS files from JSON
        run: uv run ical_gen.py

      - name: Upload static ICS files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
            path: CPSched.Backend/ics/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate
    permissions:
        pages: write
        id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
